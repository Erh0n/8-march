  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.8s ease;
    }

    /* ---------- АНИМАЦИЯЛАР ---------- */
    @keyframes floatHeart {
      0% { transform: translateY(110vh) scale(0.3) rotate(0deg); opacity: 0; }
      15% { opacity: 0.9; }
      85% { opacity: 0.6; }
      100% { transform: translateY(-80px) scale(1.2) rotate(360deg); opacity: 0; }
    }
    
    @keyframes floatPetal {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      12% { opacity: 0.8; }
      88% { opacity: 0.4; }
      100% { transform: translateY(-60px) rotate(720deg); opacity: 0; }
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.5); }
      70% { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px var(--g1); }
      50% { box-shadow: 0 0 50px var(--g1), 0 0 80px var(--g2); }
    }
    
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.25); }
      30% { transform: scale(1); }
      45% { transform: scale(1.2); }
      60% { transform: scale(1); }
    }
    
    @keyframes shimmer {
      0% { background-position: -300% center; }
      100% { background-position: 300% center; }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    
    @keyframes ripple {
      to { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }
    
    @keyframes confettiFall {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    
    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .glass {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.8px solid rgba(255, 255, 255, 0.85);
    }
    
    .fade-up { animation: fadeUp 0.7s ease both; }
    .pop-in { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .slide-in { animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .heart-beat { animation: heartBeat 2s infinite; }

    /* ---------- ФОН ЭЛЕМЕНТТЕРІ ---------- */
    #floatingHearts, #floatingPetals, #floatingStars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    
    #confettiContainer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 990;
    }

    .float-heart {
      position: absolute;
      animation: floatHeart linear infinite;
      opacity: 0;
      user-select: none;
    }
    
    .float-petal {
      position: absolute;
      animation: floatPetal linear infinite;
      opacity: 0;
      user-select: none;
    }
    
    .float-star {
      position: absolute;
      animation: twinkle ease-in-out infinite;
      opacity: 0;
      user-select: none;
    }
    
    .confetti-item {
      position: absolute;
      animation: confettiFall ease forwards;
      user-select: none;
    }

  let currentUser = null;

  // ---------- ФОНДЫҚ ЭЛЕМЕНТТЕРДІ ЖАСАУ ----------
  function createBackgroundElements() {
    // Жүректер
    const heartsContainer = document.getElementById('floatingHearts');
    heartsContainer.innerHTML = '';
    for (let i = 0; i < 20; i++) {
      const heart = document.createElement('div');
      heart.className = 'float-heart';
      const hearts = ['❤️', '💕', '💗', '💓', '💖', '💘', '💝'];
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.fontSize = (15 + Math.random() * 30) + 'px';
      const duration = 10 + Math.random() * 15;
      heart.style.animationDuration = duration + 's';
      heart.style.animationDelay = -Math.random() * duration + 's';
      heartsContainer.appendChild(heart);
    }

    // Гүл жапырақтары
    const petalsContainer = document.getElementById('floatingPetals');
    petalsContainer.innerHTML = '';
    for (let i = 0; i < 25; i++) {
      const petal = document.createElement('div');
      petal.className = 'float-petal';
      const petals = ['🌸', '🌷', '🌺', '🌼', '🌻', '🌸', '💐'];
      petal.textContent = petals[Math.floor(Math.random() * petals.length)];
      petal.style.left = Math.random() * 100 + '%';
      petal.style.fontSize = (14 + Math.random() * 28) + 'px';
      const duration = 12 + Math.random() * 15;
      petal.style.animationDuration = duration + 's';
      petal.style.animationDelay = -Math.random() * duration + 's';
      petalsContainer.appendChild(petal);
    }

    // Жұлдыздар
    const starsContainer = document.getElementById('floatingStars');
    starsContainer.innerHTML = '';
    for (let i = 0; i < 35; i++) {
      const star = document.createElement('div');
      star.className = 'float-star';
      star.textContent = Math.random() > 0.5 ? '✦' : '✧';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.fontSize = (8 + Math.random() * 16) + 'px';
      star.style.color = `hsl(${280 + Math.random() * 80}, 80%, 75%)`;
      star.style.animationDuration = (2 + Math.random() * 5) + 's';
      star.style.animationDelay = Math.random() * 4 + 's';
      starsContainer.appendChild(star);
    }
  }

  // ---------- КОНФЕТТИ ----------
  function launchConfetti(count = 18) {
    const container = document.getElementById('confettiContainer');
    const emojis = ['🌸', '💕', '✨', '🌺', '💜', '🎀', '🌹', '⭐', '🌷', '💗', '🎊', '❤️', '💖'];
    
    for (let i = 0; i < count; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti-item';
      confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-30px';
      confetti.style.fontSize = (18 + Math.random() * 25) + 'px';
      confetti.style.animationDuration = (1.8 + Math.random() * 1.8) + 's';
      confetti.style.animationDelay = Math.random() * 0.6 + 's';
      container.appendChild(confetti);
      
      setTimeout((elem) => {
        if (elem.parentNode) elem.remove();
      }, 3800, confetti);
    }
  }

  function launchFlowers() {
    const flowers = ['🌸', '🌺', '🌷', '💐', '🌻', '🌹', '🌼'];
    for (let i = 0; i < 15; i++) {
      const flower = document.createElement('div');
      flower.className = 'confetti-item';
      flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
      flower.style.left = Math.random() * 100 + '%';
      flower.style.top = '-30px';
      flower.style.fontSize = (22 + Math.random() * 25) + 'px';
      flower.style.animationDuration = (2.2 + Math.random() * 1.8) + 's';
      document.body.appendChild(flower);
      
      setTimeout((elem) => {
        if (elem.parentNode) elem.remove();
      }, 4200, flower);
    }
  }

  // ---------- ЛОГИН БЕТІ ----------
  function showLoginPage(errorMessage = '') {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('personalPage').style.display = 'none';
    document.getElementById('sentModal').style.display = 'none';
    
    document.body.style.background = 'linear-gradient(145deg, #fce4ec, #e8d5f5, #d4e8ff, #ffecd2)';
    createBackgroundElements();

    let html = `
      <div class="login-card glass pop-in">
        <div class="logo-area">
          <div class="logo-circle">🌸</div>
          <h1>8 Март құтты болсын!</h1>
          <p>Құрметпен, сізге арналған</p>
        </div>
    `;

    if (errorMessage) {
      html += `<div class="error-message">${errorMessage}</div>`;
    }

    html += `
        <label class="input-label">Логин</label>
        <input type="text" id="loginInput" class="input-field" placeholder="Логиніңізді енгізіңіз" autocomplete="off">
        
        <label class="input-label">Құпия сөз</label>
        <div class="password-wrapper">
          <input type="password" id="passwordInput" class="input-field" placeholder="********" style="margin-bottom: 0;" autocomplete="off">
          <button class="eye-button" id="togglePasswordBtn" onclick="window.togglePasswordVisibility()">👁️</button>
        </div>
        
        <button class="login-button" onclick="window.handleLogin()">✨ Кіру ✨</button>
      </div>
    `;

    document.getElementById('loginPage').innerHTML = html;

    // Enter батырмасын басқанда кіру
    document.getElementById('loginInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') window.handleLogin();
    });
    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') window.handleLogin();
    });

    if (errorMessage) {
      const card = document.querySelector('.login-card');
      if (card) {
        card.style.animation = 'shake 0.5s';
        setTimeout(() => card.style.animation = '', 500);
      }
    }
  }

  // Құпия сөзді көрсету/жасыру
  window.togglePasswordVisibility = function() {
    const input = document.getElementById('passwordInput');
    const btn = document.getElementById('togglePasswordBtn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁️';
    }
  };

  // Кіру
  window.handleLogin = function() {
    const login = document.getElementById('loginInput')?.value.trim().toLowerCase();
    const password = document.getElementById('passwordInput')?.value.trim();

    if (!login) {
      showLoginPage('Логин енгізіңіз!');
      return;
    }

    const user = users.find(u => u.id === login);
    if (!user) {
      showLoginPage('Логин табылмады!');
      return;
    }

    if (password !== user.pass) {
      showLoginPage('Құпия сөз қате!');
      return;
    }

    currentUser = user;
    completedWishes = {};
    user.wishes.forEach((_, index) => completedWishes[index] = false);
    showPersonalPage();
  };

  // ---------- ЖЕКЕ БЕТ ----------
  function showPersonalPage() {
    if (!currentUser) return;
    
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('personalPage').style.display = 'block';
    document.getElementById('sentModal').style.display = 'none';
    
    document.body.style.background = currentUser.bg;
    createBackgroundElements();

    const user = currentUser;
    const fullName = user.name;
    const firstName = user.name.split(' ')[0];

    // Фотоны көрсету (эмодзи немесе URL)
    let photoHtml = '';
    if (user.photo && (user.photo.startsWith('http') || user.photo.startsWith('data:'))) {
      photoHtml = `<img src="${user.photo}" alt="${fullName}">`;
    } else {
      photoHtml = `<div class="photo-placeholder">${user.photo || user.emoji}</div>`;
    }

    let html = `
      <div class="personal-header glass slide-in">
        <div class="header-logo" style="color: ${user.accent}">${user.emoji} Құттықтау</div>
        <button class="logout-button" onclick="window.handleLogout()" style="color: ${user.textColor}">Шығу</button>
      </div>
      
      <div class="hero-section">
        <div class="photo-wrapper">
          <div class="photo-ring" style="background: ${user.grad}; --g1: ${user.glow1}; --g2: ${user.glow2}">
            <div class="photo-inner">
              ${photoHtml}
            </div>
          </div>
        </div>
        <div class="greeting-text" style="color: ${user.subColor}">Құрметті ✦</div>
        <div class="full-name" style="color: ${user.textColor}">${fullName}</div>
        <div class="tagline-text" style="color: ${user.subColor}">${user.tagline}</div>
      </div>
      
      <div class="content-container">
        <div class="card" style="background: ${user.grad}; animation-delay: 0.1s;">
          <div style="font-family: 'Dancing Script', cursive; font-size: 30px; text-align: center; color: white;">🌸 8 Март мерекесі құтты болсын! 🌸</div>
        </div>
        
        <div class="card glass" style="border-color: ${user.borderColor}; animation-delay: 0.15s; background: ${user.cardBg};">
          <div class="card-title" style="color: ${user.subColor}">💌 Жүректен шыққан тілек</div>
          <div class="message-text" style="color: ${user.textColor}">${user.message}</div>
        </div>
        
        <div class="card glass" style="border-color: ${user.borderColor}; animation-delay: 0.2s; background: ${user.cardBg};">
          <div class="card-title" style="color: ${user.subColor}">⭐ Сіздің ерекшелігіңіз</div>
          <div class="special-inner">
            <div class="special-emoji">${user.special.emoji}</div>
            <div class="special-title" style="color: ${user.textColor}">${user.special.title}</div>
            <div class="special-sub" style="color: ${user.subColor}">${user.special.desc}</div>
          </div>
        </div>
        
        <div class="card glass" style="border-color: ${user.borderColor}; animation-delay: 0.25s; background: ${user.cardBg};">
          <div class="card-title" style="color: ${user.subColor}">🌟 Тілектер тізімі</div>
          <div class="wishes-list" id="wishesContainer"></div>
        </div>
        
        <button class="send-button" id="sendWishesBtn" style="background: ${user.grad}">${user.btnText}</button>
      </div>
    `;

    document.getElementById('personalPage').innerHTML = html;

    renderWishesList();
    
    document.getElementById('sendWishesBtn').addEventListener('click', () => {
      handleSendWishes();
    });
  }

  // Тілектер тізімін көрсету
  function renderWishesList() {
    if (!currentUser) return;
    
    const container = document.getElementById('wishesContainer');
    if (!container) return;
    
    const user = currentUser;
    let wishesHtml = '';
    
    user.wishes.forEach((wish, index) => {
      const isCompleted = completedWishes[index] || false;
      wishesHtml += `
        <div class="wish-item ${isCompleted ? 'completed' : ''}" 
             onclick="window.toggleWish(${index})"
             style="background: ${isCompleted ? user.accent + '20' : 'rgba(255,255,255,0.8)'}; border-color: ${user.borderColor}">
          <div class="wish-checkbox" style="border-color: ${user.accent}; ${isCompleted ? 'background: ' + user.accent : ''}">
            ${isCompleted ? '✓' : ''}
          </div>
          <div class="wish-text" style="color: ${user.textColor}">${wish}</div>
        </div>
      `;
    });
    
    container.innerHTML = wishesHtml;
  }

  // Тілекті белгілеу/белгілеуді алу
  window.toggleWish = function(index) {
    if (!currentUser) return;
    completedWishes[index] = !completedWishes[index];
    if (completedWishes[index]) {
      launchConfetti(6);
    }
    renderWishesList();
  };

  // Тілектерді жіберу
  function handleSendWishes() {
    launchConfetti(30);
    launchFlowers();
    
    const user = currentUser;
    const modal = document.getElementById('sentModal');
    
    modal.style.display = 'flex';
    modal.innerHTML = `
      <div class="modal-box glass" style="background: ${user.cardBg}">
        <div class="modal-emoji">${user.emoji}</div>
        <div class="modal-title" style="color: ${user.textColor}">Жіберілді! ✨</div>
        <div class="modal-text" style="color: ${user.subColor}">${user.sentText}</div>
        <button class="modal-close" onclick="window.closeModal()" style="background: ${user.grad}">Рахмет</button>
      </div>
    `;
  }

  window.closeModal = function() {
    document.getElementById('sentModal').style.display = 'none';
  };

  // Шығу
  window.handleLogout = function() {
    currentUser = null;
    completedWishes = {};
    document.getElementById('personalPage').style.display = 'none';
    document.getElementById('sentModal').style.display = 'none';
    showLoginPage();
  };

  // Периодты түрде конфетти (мерекелік атмосфера)
  setInterval(() => {
    if (currentUser) {
      launchConfetti(4);
    }
  }, 10000);

  // ---------- БАСТАУ ----------
  window.onload = function() {
    showLoginPage();
  };

})();
